user nginx;
worker_processes auto;
# Make sure the system limit is higher than the worker_rlimit_nofile value
# More info: https://github.com/syncthing/syncthing/issues/5319#issuecomment-437977574
worker_rlimit_nofile 131072;
# Shutdown workers within 60 seconds, otherwise it can keep serving active websocket request based on `proxy_read_timeout 1d;`
worker_shutdown_timeout 60s;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 65536;
}


http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  map $remote_addr $remote_addr_anon {
    ~(?P<ip>\d+\.\d+\.\d+)\. $ip.0;
    ~(?P<ip>[^:]+:[^:]+): $ip::;
    127.0.0.1 $remote_addr;
    ::1 $remote_addr;
    default 0.0.0.0;
  }

  log_format main '$remote_addr_anon - $remote_user [$time_local] "$request" '
  '$status $body_bytes_sent "$http_referer" '
  '"$http_user_agent" $upstream_response_time';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  #tcp_nopush     on;

  keepalive_timeout 65;

  server_tokens off;

  ##
  # Gzip Settings
  ##

  gzip on;
  gzip_disable "msie6";

  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_min_length 256;
  gzip_types
  application/atom+xml
  application/javascript
  application/json
  application/rss+xml
  application/vnd.ms-fontobject
  application/x-font-ttf
  application/x-web-app-manifest+json
  application/xhtml+xml
  application/xml
  application/octet-stream
  font/opentype
  image/svg+xml
  image/x-icon
  text/css
  text/plain
  text/x-component;

  include /etc/nginx/conf.d/*.conf;
  include /etc/nginx/sites-enabled/*;

}
